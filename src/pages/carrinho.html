<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#f5e6e0]">
    <header class="flex items-center bg-red-600 justify-between px-6 py-4">
        <div class="min-w-40"></div>
        <div class="flex justify-end gap-5">
            <button class="bg-gray-200 rounded-full px-4 py-2">
                <a href="./login.html">Ou faça login</a>
            </button>
            <button>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="white" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
        </div>
    </header>

    <div class="flex items-center justify-center min-h-[calc(100vh-120px)]">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm mx-4">
            <!-- Cart Items -->
            <div class="space-y-3 mb-6">
                <!-- Item 1 -->
                <div class="flex items-center justify-between bg-gray-200 rounded-lg p-3">
                    <div class="flex items-center gap-3">
                        <div class="size-12 bg-white rounded flex items-center justify-center text-2xl">
                            🥤
                        </div>
                        <div>
                            <p class="text-sm text-gray-800">Coca-Cola 2L</p>
                            <p class="text-xs text-gray-600">R$ 13,99</p>
                        </div>
                    </div>
                    <button class="p-2 hover:bg-gray-300 rounded">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 text-gray-700">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                        </svg>
                    </button>
                </div>

                <!-- Item 2 -->
                <div class="flex items-center justify-between bg-gray-200 rounded-lg p-3">
                    <div class="flex items-center gap-3">
                        <div class="size-12 bg-white rounded flex items-center justify-center text-2xl">
                            🌭
                        </div>
                        <div>
                            <p class="text-sm text-gray-800">Cachorro quente completo</p>
                            <p class="text-xs text-gray-600">R$ 10,99</p>
                        </div>
                    </div>
                    <button class="p-2 hover:bg-gray-300 rounded">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 text-gray-700">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Buttons -->
            <div class="space-y-3">
                <button class="w-full bg-gray-700 text-white py-3 rounded-lg hover:bg-gray-800">
                    Limpar Carrinho
                </button>
                <button class="w-full bg-gray-900 text-white py-3 rounded-lg hover:bg-gray-800 shadow-md">
                    <a href="./cardapio.html">Pagar</a>
                </button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 flex justify-between items-center px-6 py-3 text-xs text-gray-700">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <span>Footer: 12345-6788</span>
        </div>
        
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            <span>Todos os direitos reservados</span>
        </div>
    </footer>
</body>

</html>
