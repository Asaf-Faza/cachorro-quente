<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../output.css">
    <title>Login</title>
</head>

<body>
    <header class="flex items-center bg-red-600 justify-between">
        <div class=" flex items-center min-w-40">
            <div class="rounded-full w-15 h-15 container ">
                <img src="./src/img/user.png" alt="foto de perfil do usuário" class="">
            </div>
            <div>
                <p>Fazer Login</p>
            </div>
        </div>
        <div class="container flex justify-end">
            <button class="flex items-center justify-center bg-gray-200 rounded-full min-w-40">
                <p>Ou crie sua conta</p>
            </button>
            <button class="mx-5">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
        </div>
    </header>

    <main class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6">Entrar na sua conta</h2>
            <form>
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
                    <input type="email" id="email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-600" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                    <input type="password" id="password" name="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-600" required>
                </div>
                <button type="submit" class="w-full bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-600">Entrar</button>
            </form>
            <p class="text-center text-gray-600 mt-4">Não tem uma conta? <a href="#" class="text-red-600 hover:underline">Cadastre-se</a></p>
        </div>
    </main>

</body>
</html>
